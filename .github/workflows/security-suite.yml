# Reusable workflow: suite de análisis estático centralizada para todos los
# repos de A-Digital-Cafe (root + presets, públicos y privados).
#
# Este repo (adc-ci) es PÚBLICO a propósito: un reusable workflow en repo privado
# no puede ser invocado por repos públicos. El archivo no contiene secrets; estos
# se inyectan en runtime desde cada repo (el caller pasa solo los 5 secrets SMTP
# en el job weekly; pr/main no reciben secrets).
#
# Seguridad ante PRs de la comunidad (forks): el caller dispara en
# `pull_request_review` (aprobado), que corre en contexto del repo BASE con el
# workflow del branch base (un PR no puede alterarlo). La suite es 100% estática
# (Semgrep con reglas remotas, OSV y Trivy solo leen archivos); NUNCA se ejecuta
# `install`/`build` del código del PR, así que no corre código no confiable.
# El modo `pr` además no usa ningún secret (SMTP solo lo usa el modo `weekly`).
#
# Modos (input `mode`):
#   pr     -> gate sobre PR aprobado: Semgrep + OSV (vulns/licencias) + Trivy (docker). Falla el check si hay hallazgos.
#   main   -> push a main (incluye push directo): mismo gate Semgrep+OSV+Trivy, PERO
#             se omite si el commit ya se escaneó en su PR (dedup por SHA vía cache).
#   weekly -> escaneo completo + OSSF Scorecard, report-only, + email de resumen.
#
# Dedup: cada scan limpio guarda un marcador en cache `scanned-<sha>`. En push a
# main, si el commit es un merge cuyo 2º padre (head del PR) ya está marcado, se
# omite. Limitación: solo aplica a merge commits; squash/rebase generan SHAs
# nuevos y se re-escanean (fail-open hacia escanear).
#
# Requisitos de org (una sola vez): ver README.md de este repo.
name: security-suite

on:
  workflow_call:
    inputs:
      mode:
        description: "pr | main | weekly"
        required: true
        type: string
      email:
        description: "Enviar resumen por email (solo modo weekly)"
        required: false
        default: false
        type: boolean
    secrets:
      SMTP_SERVER:
        required: false
      SMTP_PORT:
        required: false
      SMTP_USERNAME:
        required: false
      SMTP_PASSWORD:
        required: false
      SECURITY_REPORT_TO:
        required: false

# Licencias permitidas (alternativa libre a FOSSA, vía OSV-Scanner). Report-only.
env:
  ALLOWED_LICENSES: "MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC,0BSD,Unlicense,CC0-1.0,MPL-2.0,Python-2.0,BlueOak-1.0.0,MIT-0,CC-BY-4.0,MulanPSL-2.0,LGPL-3.0-or-later"

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------------
  detect:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.r.outputs.ref }}
      has_docker: ${{ steps.d.outputs.has_docker }}
      skip_scan: ${{ steps.skip.outputs.skip_scan }}
    steps:
      - id: r
        env:
          MODE: ${{ inputs.mode }}
          PR_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ "$MODE" = "pr" ]; then
            echo "ref=$PR_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=$PUSH_SHA" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.r.outputs.ref }}
          fetch-depth: 2 # necesario para resolver HEAD^2 (head del PR mergeado)
          persist-credentials: false
      # --- Dedup (solo push a main): ¿este commit ya se escaneó en su PR? ---
      # Si es un merge commit, su 2º padre (HEAD^2) es el head del PR ya escaneado.
      - id: dedup
        if: ${{ inputs.mode == 'main' }}
        run: |
          PR_HEAD=$(git rev-parse HEAD^2 2>/dev/null || echo "")
          echo "pr_head=$PR_HEAD" >> "$GITHUB_OUTPUT"
      - id: cache_head
        if: ${{ inputs.mode == 'main' && steps.dedup.outputs.pr_head != '' }}
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .scan-marker
          key: scanned-${{ steps.dedup.outputs.pr_head }}
          lookup-only: true
      - id: skip
        run: |
          if [ "${{ steps.cache_head.outputs.cache-hit }}" = "true" ]; then
            echo "skip_scan=true" >> "$GITHUB_OUTPUT"
            echo "Commit ya escaneado en su PR (${{ steps.dedup.outputs.pr_head }}); se omite re-escaneo." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "skip_scan=false" >> "$GITHUB_OUTPUT"
          fi
      - id: d
        name: Detectar Dockerfiles / docker-compose
        run: |
          if find . -path ./node_modules -prune -o \
               \( -iname 'Dockerfile' -o -iname 'Dockerfile.*' \
                  -o -iname 'docker-compose*.y*ml' -o -iname 'compose.y*ml' \) -print \
             | grep -q .; then
            echo "has_docker=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_docker=false" >> "$GITHUB_OUTPUT"
          fi

  # --------------------------------------------------------------------------
  semgrep:
    needs: detect
    if: ${{ inputs.mode == 'weekly' || inputs.mode == 'pr' || (inputs.mode == 'main' && needs.detect.outputs.skip_scan != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Instalar Semgrep
        run: python -m pip install --no-cache-dir semgrep
      - name: Semgrep scan
        run: |
          semgrep scan --config auto --metrics off \
            --sarif --output semgrep.sarif \
            --json --output semgrep.json || true
      - name: Resumen
        id: sum
        run: |
          COUNT=$(jq '.results | length' semgrep.json 2>/dev/null || echo 0)
          {
            echo "## 🔎 Semgrep"
            echo ""
            echo "**Hallazgos:** $COUNT"
            echo ""
            if [ "$COUNT" -gt 0 ]; then
              echo "| Severidad | Regla | Archivo:Línea |"
              echo "| --- | --- | --- |"
              jq -r '.results[] | "| \(.extra.severity) | \(.check_id) | \(.path):\(.start.line) |"' semgrep.json | head -50
            else
              echo "_Sin hallazgos._"
            fi
          } | tee semgrep-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: summary-semgrep
          path: semgrep-summary.md
      - name: Gate (PR y push a main)
        if: ${{ inputs.mode != 'weekly' && steps.sum.outputs.count != '0' }}
        run: |
          echo "::error::Semgrep encontró ${{ steps.sum.outputs.count }} hallazgo(s)."
          exit 1

  # --------------------------------------------------------------------------
  osv:
    needs: detect
    if: ${{ inputs.mode == 'weekly' || inputs.mode == 'pr' || (inputs.mode == 'main' && needs.detect.outputs.skip_scan != 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false
      - name: Instalar OSV-Scanner
        run: |
          curl --proto '=https' --tlsv1.2 -sSfL -o /usr/local/bin/osv-scanner \
            https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64
          chmod +x /usr/local/bin/osv-scanner
      - name: Escaneo de vulnerabilidades
        run: osv-scanner scan source -r --format json --output osv.json . || true
      - name: Escaneo de licencias (report-only)
        run: osv-scanner scan source -r --licenses="$ALLOWED_LICENSES" --format json --output osv-lic.json . || true
      - name: Resumen
        id: sum
        run: |
          VULNS=$(jq '[.results[].packages[].vulnerabilities[]?] | length' osv.json 2>/dev/null || echo 0)
          # Excluye paquetes first-party (workspaces, version "workspace:..."): no son
          # dependencias de terceros y OSV no puede leer su license del package.json local.
          LIC=$(jq '[.results[].packages[] | select((.package.version // "") | startswith("workspace:") | not) | .license_violations[]?] | length' osv-lic.json 2>/dev/null || echo 0)
          {
            echo "## 📦 OSV-Scanner (vulns + licencias)"
            echo ""
            echo "**Vulnerabilidades:** $VULNS · **Violaciones de licencia:** $LIC"
            echo ""
            if [ "$VULNS" -gt 0 ]; then
              echo "| Paquete | ID | Severidad |"
              echo "| --- | --- | --- |"
              jq -r '.results[].packages[] | select(.vulnerabilities) | .package.name as $p | .vulnerabilities[] | "| \($p) | \(.id) | \((.database_specific.severity // "n/a")) |"' osv.json 2>/dev/null | head -50
            else
              echo "_Sin vulnerabilidades conocidas._"
            fi
          } | tee osv-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "vulns=$VULNS" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: summary-osv
          path: osv-summary.md
      - name: Gate (PR y push a main)
        if: ${{ inputs.mode != 'weekly' && steps.sum.outputs.vulns != '0' }}
        run: |
          echo "::error::OSV encontró ${{ steps.sum.outputs.vulns }} vulnerabilidad(es)."
          exit 1

  # --------------------------------------------------------------------------
  trivy:
    needs: detect
    if: ${{ needs.detect.outputs.has_docker == 'true' && (inputs.mode == 'weekly' || inputs.mode == 'pr' || (inputs.mode == 'main' && needs.detect.outputs.skip_scan != 'true')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false
      # El trivy-action v0.28.0 invocaba internamente setup-trivy@v0.2.1 (tag ya
      # removido por aquasecurity) y fallaba. Instalamos Trivy con setup-trivy
      # v0.3.1 fijado por SHA y subimos trivy-action a v0.36.0, que soporta
      # skip-setup-trivy para reutilizar el binario ya instalado.
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1
      - name: Trivy config (Dockerfiles / docker-compose)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: json
          output: trivy.json
          severity: HIGH,CRITICAL
          exit-code: "0"
          skip-setup-trivy: true
      - name: Resumen
        id: sum
        run: |
          MIS=$(jq '[.Results[].Misconfigurations[]?] | length' trivy.json 2>/dev/null || echo 0)
          {
            echo "## 🐳 Trivy (config Docker)"
            echo ""
            echo "**Misconfiguraciones HIGH/CRITICAL:** $MIS"
            echo ""
            if [ "$MIS" -gt 0 ]; then
              echo "| Severidad | ID | Archivo | Descripción |"
              echo "| --- | --- | --- | --- |"
              jq -r '.Results[] | .Target as $t | (.Misconfigurations[]? | "| \(.Severity) | \(.ID) | \($t) | \(.Title) |")' trivy.json 2>/dev/null | head -50
            else
              echo "_Sin misconfiguraciones HIGH/CRITICAL._"
            fi
          } | tee trivy-summary.md >> "$GITHUB_STEP_SUMMARY"
          echo "mis=$MIS" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: summary-trivy
          path: trivy-summary.md
      - name: Gate (PR y push a main)
        if: ${{ inputs.mode != 'weekly' && steps.sum.outputs.mis != '0' }}
        run: |
          echo "::error::Trivy encontró ${{ steps.sum.outputs.mis }} misconfiguración(es) HIGH/CRITICAL."
          exit 1

  # --------------------------------------------------------------------------
  scorecard:
    needs: detect
    if: ${{ inputs.mode == 'weekly' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.detect.outputs.ref }}
          persist-credentials: false
      - name: OSSF Scorecard
        uses: ossf/scorecard-action@62b2cac7ed8198b15735ed49ab1e5cf35480ba46 # v2.4.0
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false
      - name: Resumen
        run: |
          {
            echo "## 🛡️ OSSF Scorecard"
            echo ""
            if [ -f scorecard.sarif ]; then
              jq -r '.runs[0].tool.driver.rules[]? | "- \(.name): \(.shortDescription.text)"' scorecard.sarif 2>/dev/null | head -40
            else
              echo "_Scorecard no produjo resultados._"
            fi
          } | tee scorecard-summary.md >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: summary-scorecard
          path: scorecard-summary.md

  # --------------------------------------------------------------------------
  # Registra el SHA escaneado (solo si pasó sin hallazgos) para que el push a
  # main posterior no re-escanee lo ya cubierto por su PR. Cache scope = main
  # (pull_request_review corre en contexto del branch base).
  record-scanned:
    needs: [detect, semgrep, osv, trivy]
    if: >-
      ${{ always()
          && (inputs.mode == 'pr' || inputs.mode == 'main')
          && needs.detect.outputs.skip_scan != 'true'
          && needs.semgrep.result == 'success'
          && needs.osv.result == 'success'
          && (needs.trivy.result == 'success' || needs.trivy.result == 'skipped') }}
    runs-on: ubuntu-latest
    steps:
      - name: Crear marcador
        env:
          REF: ${{ needs.detect.outputs.ref }}
        run: echo "$REF scanned $(date -u +%FT%TZ)" > .scan-marker
      - uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        continue-on-error: true # no falla si la clave ya existe
        with:
          path: .scan-marker
          key: scanned-${{ needs.detect.outputs.ref }}

  # --------------------------------------------------------------------------
  report-email:
    needs: [semgrep, osv, trivy, scorecard]
    if: ${{ always() && inputs.mode == 'weekly' && inputs.email }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: summaries
          pattern: summary-*
          merge-multiple: true
      - name: Construir cuerpo del email
        run: |
          {
            echo "# Reporte semanal de seguridad — ${{ github.repository }}"
            echo ""
            echo "_Generado el $(date -u '+%Y-%m-%d %H:%M UTC') · run [#${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})_"
            echo ""
            for f in summaries/*.md; do [ -f "$f" ] && cat "$f" && echo ""; done
          } > report.md
          cat report.md >> "$GITHUB_STEP_SUMMARY"
      - name: ¿Hay SMTP configurado?
        id: smtp
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        run: |
          if [ -n "$SMTP_SERVER" ]; then echo "ok=true" >> "$GITHUB_OUTPUT"; else echo "ok=false" >> "$GITHUB_OUTPUT"; fi
      - name: Enviar email
        if: ${{ steps.smtp.outputs.ok == 'true' }}
        uses: dawidd6/action-send-mail@4226df7daafa6fc901a43789c49bf7ab309066e7 # v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[ADC][security] Reporte semanal — ${{ github.repository }}"
          to: ${{ secrets.SECURITY_REPORT_TO }}
          from: "ADC Security CI <${{ secrets.SMTP_USERNAME }}>"
          convert_markdown: true
          html_body: file://report.md
