# Caller fino: delega toda la lógica en el reusable workflow centralizado de
# A-Digital-Cafe/adc-ci. Copiá este archivo tal cual a `.github/workflows/`
# de cada repo (root + presets). El reusable se fija por SHA (Sonar exige full
# commit SHA): al actualizar adc-ci, re-pinear acá y re-distribuir con
# scripts/distribute-security-ci.sh. El `# main` del trailer indica la rama.
name: Security

on:
  # PR aprobado por un mantenedor -> corre en contexto del repo base (seguro ante forks).
  pull_request_review:
    types: [submitted]
  # Escaneo completo + Scorecard, cada 4 días (06:00 UTC) -> report-only + email.
  # (No corre en push a main: main se cubre vía el PR aprobado + el escaneo periódico.)
  schedule:
    - cron: "0 6 */4 * *"

# Permisos mínimos por defecto (modo pr solo necesita leer contenido). El token
# de un caller solo puede ACOTAR los permisos del reusable, nunca ampliarlos: por
# eso los scopes extra de Scorecard se conceden aquí, en el job `scheduled`.
permissions:
  contents: read

jobs:
  pr:
    if: ${{ github.event_name == 'pull_request_review' && github.event.review.state == 'approved' }}
    uses: A-Digital-Cafe/adc-ci/.github/workflows/security-suite.yml@68ee89fe6c31aa59e847f1f2de320d7da4e5e0fa # main
    with:
      mode: pr

  # Solo el modo weekly manda mail: pasamos únicamente los secrets SMTP requeridos
  # (no `secrets: inherit`). Si no están definidos en la org, llegan vacíos y el
  # reusable omite el email.
  scheduled:
    if: ${{ github.event_name == 'schedule' }}
    # OSSF Scorecard (modo weekly) necesita estos scopes de lectura para su consulta
    # GraphQL ListCommits y la detección de SAST en repos PRIVADOS; id-token para
    # OIDC. Sin issues+pull-requests: "Resource not accessible by integration".
    permissions:
      contents: read
      id-token: write
      actions: read
      issues: read
      pull-requests: read
      checks: read
    uses: A-Digital-Cafe/adc-ci/.github/workflows/security-suite.yml@68ee89fe6c31aa59e847f1f2de320d7da4e5e0fa # main
    with:
      mode: weekly
      email: true
    secrets:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SECURITY_REPORT_TO: ${{ secrets.SECURITY_REPORT_TO }}
